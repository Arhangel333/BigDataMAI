version: '3.8'

# Определяем общую сеть для всех контейнеров
networks:
  lab_network:
    driver: bridge  # стандартный драйвер Docker

services:
  # ============================================
  # 1. PostgreSQL - хранилище исходных данных и модели звезда
  # ============================================
  postgres:
    image: postgres:15
    container_name: postgres_lab
    environment:
      POSTGRES_USER: spark
      POSTGRES_PASSWORD: spark123
      POSTGRES_DB: etl_lab
    ports:
      - "5432:5432"  # Пробрасываем порт наружу для DBeaver
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Постоянное хранилище
      - ./mock_data:/mock_data  # Монтируем папку с CSV для импорта
      - ./init_postgres.sql:/docker-entrypoint-initdb.d/init.sql  # Скрипт инициализации
    networks:
      - lab_network
    restart: unless-stopped

  # ============================================
  # 2. ClickHouse - ОБЯЗАТЕЛЬНО (отчеты)
  # ============================================
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_lab
    ports:
      - "8123:8123"   # HTTP интерфейс (DBeaver)
      - "9000:9000"   # Нативный протокол (Spark)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - lab_network
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ============================================
  # 3. Apache Spark с Jupyter Notebook
  # ============================================
  spark:
    image: jupyter/pyspark-notebook:latest
    container_name: spark_lab
    environment:
      - SPARK_DRIVER_OPTIONS=-Duser.timezone=UTC
      - JUPYTER_ENABLE_LAB=yes
    ports:
      - "8888:8888"   # Jupyter Notebook
      - "4040:4040"   # Spark UI
    volumes:
      - ./notebooks:/home/jovyan/work  # Ваши ноутбуки
      - ./jars:/home/jovyan/jars       # JDBC драйверы
      - ./mock_data:/home/jovyan/data  # CSV файлы
    networks:
      - lab_network
    depends_on:
      - postgres
      - clickhouse
    restart: unless-stopped

  # ============================================
  # 4. Cassandra - ОПЦИОНАЛЬНО (бонус)
  # ============================================
  cassandra:
    image: cassandra:4
    container_name: cassandra_lab
    ports:
      - "9042:9042"   # CQL порт
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - lab_network
    restart: unless-stopped
    environment:
      - CASSANDRA_CLUSTER_NAME=LabCluster
      - CASSANDRA_NUM_TOKENS=256
      - CASSANDRA_SEEDS=cassandra

  # ============================================
  # 5. MongoDB - ОПЦИОНАЛЬНО (бонус)
  # ============================================
  mongodb:
    image: mongo:6
    container_name: mongodb_lab
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - lab_network
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123

  # ============================================
  # 6. Neo4j - ОПЦИОНАЛЬНО (бонус)
  # ============================================
  neo4j:
    image: neo4j:5
    container_name: neo4j_lab
    ports:
      - "7474:7474"   # HTTP (браузер)
      - "7687:7687"   # Bolt (Spark подключение)
    volumes:
      - neo4j_data:/data
    networks:
      - lab_network
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/test1234
      - NEO4J_PLUGINS=["apoc"]

  # ============================================
  # 7. Valkey (Redis-совместимый) - ОПЦИОНАЛЬНО
  # ============================================
  valkey:
    image: valkey/valkey:7
    container_name: valkey_lab
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    networks:
      - lab_network
    restart: unless-stopped
    command: valkey-server --appendonly yes

# ============================================
# Volumes (постоянное хранилище данных)
# ============================================
volumes:
  postgres_data:
  clickhouse_data:
  cassandra_data:
  mongodb_data:
  neo4j_data:
  valkey_data: