version: '3.8'

# Определяем общую сеть для всех контейнеров
networks:
  lab_network:
    driver: bridge  # стандартный драйвер Docker

services:
  # ============================================
  # 1. PostgreSQL - хранилище исходных данных и модели звезда
  # ============================================
  postgres:
    image: postgres:15
    container_name: postgres_lab
    environment:
      POSTGRES_USER: spark
      POSTGRES_PASSWORD: spark123
      POSTGRES_DB: etl_lab
    ports:
      - "5432:5432"  # Пробрасываем порт наружу для DBeaver
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Постоянное хранилище
      - ./mock_data:/mock_data  # Монтируем папку с CSV для импорта
      - ./init_postgres.sql:/docker-entrypoint-initdb.d  # Скрипт инициализации
    networks:
      - lab_network
    restart: unless-stopped

  # ============================================
  # 2. ClickHouse - ОБЯЗАТЕЛЬНО (отчеты)
  # ============================================
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_lab
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
    ports:
      - "8123:8123"   # HTTP интерфейс (DBeaver)
      - "9000:9000"   # Нативный протокол (Spark)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - lab_network
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ============================================
  # 4. MongoDB — документоориентированная БД
  # ============================================
  mongodb:
    image: mongo:7
    container_name: mongodb_lab
    environment:
      MONGO_INITDB_ROOT_USERNAME: spark
      MONGO_INITDB_ROOT_PASSWORD: spark123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - lab_network
    restart: unless-stopped

  # Веб-интерфейс MongoDB
  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express_lab
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: spark
      ME_CONFIG_MONGODB_ADMINPASSWORD: spark123
      ME_CONFIG_MONGODB_URL: mongodb://spark:spark123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    networks:
      - lab_network
    depends_on:
      - mongodb
    restart: unless-stopped

  # ============================================
  # 5. Neo4j — графовая БД
  # ============================================
  neo4j:
    image: neo4j:5
    container_name: neo4j_lab
    environment:
      NEO4J_AUTH: neo4j/neo4j123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # Web интерфейс
      - "7687:7687"   # Bolt протокол
    volumes:
      - neo4j_data:/data
    networks:
      - lab_network
    restart: unless-stopped

  # ============================================
  # 6. Valkey (Redis-совместимый) — key-value хранилище
  # ============================================
  valkey:
    image: valkey/valkey:7.2
    container_name: valkey_lab
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    networks:
      - lab_network
    restart: unless-stopped
    command: valkey-server --appendonly yes --requirepass valkey123

  # Веб-интерфейс Valkey (Redis)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis_commander_lab
    environment:
      REDIS_HOSTS: local:valkey:6379:0:valkey123
    ports:
      - "8082:8081"
    networks:
      - lab_network
    depends_on:
      - valkey
    restart: unless-stopped

  # ============================================
  # 7. Cassandra — колоночная распределённая БД
  # ============================================
  cassandra:
    image: cassandra:5.0
    container_name: cassandra_lab
    environment:
      - CASSANDRA_PASSWORD=cassandra123
      - CASSANDRA_DC=dc1
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./init_cassandra:/docker-entrypoint-initdb.d
    networks:
      - lab_network
    entrypoint: ["bash", "/docker-entrypoint-initdb.d/init.sh"]
    restart: unless-stopped

  # ============================================
  # 8. Apache Spark с Jupyter Notebook
  # ============================================
  spark:
    image: jupyter/pyspark-notebook:latest
    container_name: spark_lab
    environment:
      - SPARK_DRIVER_OPTIONS=-Duser.timezone=UTC
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=admin
    ports:
      - "8888:8888"   # Jupyter Notebook
      - "4040:4040"   # Spark UI
    volumes:
      - ./notebooks:/home/jovyan/work  # Ваши ноутбуки
      - ./jars:/home/jovyan/jars       # JDBC драйверы
      - ./mock_data:/home/jovyan/data  # CSV файлы
      - ./init_spark/spark_init.sh:/home/jovyan/spark_init.sh  # Init-скрипт
    networks:
      - lab_network
    depends_on:
      - postgres
      - clickhouse
      - mongodb
      - neo4j
      - valkey
      - cassandra
    entrypoint: ["bash", "/home/jovyan/spark_init.sh"]
    restart: unless-stopped
# ============================================
# Volumes (постоянное хранилище данных)
# ============================================
volumes:
  postgres_data:
  clickhouse_data:
  mongodb_data:
  neo4j_data:
  valkey_data:
  cassandra_data: